<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELISY 254 | Secure Terminal</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0d1117; --success: #3fb950; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden; }

        /* AUTHENTICATION OVERLAY */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.98);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .auth-card {
            background: var(--card); padding: 40px; border: 2px solid var(--neon);
            border-radius: 15px; width: 380px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box;
            background: #0d1117; border: 1px solid #30363d;
            color: white; border-radius: 5px; text-align: center; font-size: 1rem;
        }
        .btn {
            background: var(--neon); color: black; border: none;
            padding: 15px; width: 100%; border-radius: 5px;
            font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        #otpSection { display: none; }
        #mainDashboard { display: none; padding: 20px; flex-direction: column; align-items: center; }

        /* VIEWPORT & OVAL */
        .viewport {
            width: 100%; max-width: 600px; aspect-ratio: 4/3;
            background: #000; border: 3px solid var(--neon);
            position: relative; overflow: hidden; border-radius: 10px; perspective: 1000px;
        }
        .face-oval {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 280px; border: 2px solid var(--neon);
            border-radius: 50%; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7);
            z-index: 5; pointer-events: none;
        }
        #viewImage {
            position: absolute; top: 15%; left: 15%; width: 70%;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        /* TICKER */
        .flag-ticker {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #000;
            border-top: 1px solid var(--neon); padding: 12px 0; overflow: hidden; white-space: nowrap;
        }
        .ticker-content { display: inline-block; animation: scroll 50s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body onload="checkSession()">

    <div id="authOverlay">
        <div class="auth-card" id="loginSection">
            <h1 style="color:var(--neon); margin:0;">ELISY 254</h1>
            <p style="color:gray; font-size:0.8rem; margin-bottom:25px;">GLOBAL IDENTITY TERMINAL</p>
            <input type="text" id="userName" placeholder="Full Name (Emily)">
            <input type="text" id="userPhone" placeholder="Phone Number">
            <button class="btn" onclick="generateCode()">GENERATE 5-DIGIT CODE</button>
        </div>

        <div class="auth-card" id="otpSection">
            <h2 style="color:var(--neon)">VERIFICATION</h2>
            <div id="codeDisplay" style="font-size:2.5rem; color:var(--success); letter-spacing: 8px; margin: 15px 0; font-weight: bold;"></div>
            <p style="font-size:0.7rem; color:gray;">TYPE THE CODE ABOVE TO PROCEED</p>
            <input type="text" id="otpInput" placeholder="Enter Code" maxlength="5">
            <button class="btn" onclick="verifyAccess()" style="background:var(--success)">VERIFY & ACCESS</button>
        </div>
    </div>

    <div id="mainDashboard">
        <div style="width:100%; max-width:900px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div>
                <h2 style="color:var(--neon); margin:0;">ELISY 254 <span style="color:white; font-weight:100;">PRO</span></h2>
                <small id="sessionUser" style="color:var(--success)">● SYSTEM ENCRYPTED</small>
            </div>
            <div style="text-align:right;">
                <div id="dateNow" style="font-size:0.8rem;"></div>
                <div id="timeNow" style="font-size:1.2rem; color:var(--neon); font-weight:bold;"></div>
            </div>
        </div>

        <div class="viewport" id="vPort">
            <div class="face-oval"></div>
            <img id="viewImage" src="" style="display:none;">
        </div>

        <div style="margin-top:20px; width:100%; max-width:600px; display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div style="background:var(--card); padding:15px; border-radius:10px; border:1px solid #30363d;">
                <label style="font-size:0.7rem; color:gray;">IDENTITY SOURCE</label>
                <input type="file" id="imageInput" style="font-size:0.7rem; margin-top:5px;">
            </div>
            <div style="background:var(--card); padding:15px; border-radius:10px; border:1px solid #30363d;">
                <button onclick="doAction('blink')" style="background:#ff0055; color:white; border:none; padding:8px; width:100%; border-radius:4px; cursor:pointer;">BLINK [B]</button>
                <button onclick="logout()" style="background:gray; color:white; border:none; padding:8px; width:100%; border-radius:4px; cursor:pointer; margin-top:5px;">LOGOUT</button>
            </div>
        </div>
    </div>

    <div class="flag-ticker">
        <div class="ticker-content" id="ticker"></div>
    </div>

    <script>
        let systemOTP = "";
        let currentName = "";

        // AUTHENTICATION
        function generateCode() {
            const name = document.getElementById('userName').value;
            if (name && document.getElementById('userPhone').value) {
                currentName = name;
                systemOTP = Math.floor(10000 + Math.random() * 90000).toString();
                document.getElementById('codeDisplay').innerText = systemOTP;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('otpSection').style.display = 'block';
            } else { alert("Please enter Name and Phone"); }
        }

        function verifyAccess() {
            if (document.getElementById('otpInput').value === systemOTP) {
                localStorage.setItem('elisy_auth', currentName);
                loadDashboard(currentName);
            } else { alert("Invalid Code"); }
        }

        function checkSession() {
            const saved = localStorage.getItem('elisy_auth');
            if (saved) loadDashboard(saved);
            updateClock();
        }

        function loadDashboard(name) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'flex';
            document.getElementById('sessionUser').innerText = ● USER: ${name.toUpperCase()};
            setupTicker();
        }

        function logout() { localStorage.removeItem('elisy_auth'); location.reload(); }

        // UI EXTRAS
        function updateClock() {
            const now = new Date();
            document.getElementById('timeNow').innerText = now.toLocaleTimeString();
            document.getElementById('dateNow').innerText = now.toLocaleDateString();
            setTimeout(updateClock, 1000);
        }

        function setupTicker() {
            const list = [{n:"KENYA",f:"🇰🇪"},{n:"USA",f:"🇺🇸"},{n:"UK",f:"🇬🇧"},{n:"NIGERIA",f:"🇳🇬"},{n:"UAE",f:"🇦🇪"}];
            const html = list.map(c => <span style="margin:0 30px; color:var(--neon)">${c.f} ${c.n}</span>).join('');
            document.getElementById('ticker').innerHTML = html + html;
        }

        // LIVENESS ACTIONS
        function doAction(type) {
            const img = document.getElementById('viewImage');
            if(type === 'blink') {
                img.style.filter = 'brightness(0)';
                setTimeout(() => img.style.filter = 'brightness(1)', 150);
            }
        }

        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.getElementById('viewImage');
                    img.src = ev.target.result; img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        window.addEventListener('keydown', (e) => {
            const img = document.getElementById('viewImage');
            if (e.key.toLowerCase() === 'b') doAction('blink');
            if (e.key === 'ArrowLeft') img.style.transform = 'rotateY(-20deg)';
            if (e.key === 'ArrowRight') img.style.transform = 'rotateY(20deg)';
            if (e.key === 'ArrowUp') img.style.transform = 'rotateX(-15deg)';
            if (e.key === 'ArrowDown') img.style.transform = 'rotateX(15deg)';
        });
    </script>
</body>
</html>
